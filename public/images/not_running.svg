<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bodyGradFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EBEFEB" />
      <stop offset="100%" stop-color="#BFC7BF" />
    </linearGradient>
    <linearGradient id="badgeGradAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    <linearGradient id="chromeRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2F4F2" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>
  </defs>

  <!-- Background container -->
  <rect width="400" height="400" rx="20" fill="#FFFDF6" />

  <!-- Machine Body with a completely dark screen -->
  <g>
    <rect x="100" y="110" width="200" height="240" rx="16" fill="url(#bodyGradFront)" stroke="#94A3B8" stroke-width="2.5" />
    <!-- Screen completely black/offline -->
    <rect x="110" y="120" width="180" height="36" rx="6" fill="#020617" />
    <!-- Flashing red indicator of warning -->
    <circle cx="125" cy="138" r="4" fill="#EF4444" opacity="0.8" />
    <!-- Door -->
    <circle cx="200" cy="245" r="60" fill="none" stroke="url(#chromeRing)" stroke-width="8" />
    <circle cx="200" cy="245" r="50" fill="#1E293B" stroke="#64748B" stroke-width="1.5" />
    <!-- Disconnected power line -->
    <path d="M 180,245 L 220,245" stroke="#EF4444" stroke-width="5" stroke-linecap="round" />
    <path d="M 190,230 L 210,260" stroke="#EF4444" stroke-width="5" stroke-linecap="round" />
  </g>
  
  <!-- Danger/Error Warning Badge overlay (Amber Theme) -->
  <g transform="translate(250, 40)">
    <circle cx="50" cy="50" r="46" fill="url(#badgeGradAmber)" stroke="#FFFFFF" stroke-width="4" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.15))" />
    <!-- Warning exclamation triangle -->
    <path d="M 50,22 L 74,68 L 26,68 Z" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round" />
    <text x="50" y="60" fill="#FFFFFF" font-family="sans-serif" font-weight="bold" font-size="22" text-anchor="middle">!</text>
  </g>

  <!-- Title -->
  <text x="200" y="65" fill="#1E293B" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">POWER FAILURE &amp; NO RUN</text>
  <text x="200" y="85" fill="#64748B" font-family="sans-serif" font-size="11" text-anchor="middle">PCB Short-circuit &amp; Motor Reset</text>
</svg>
