<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="twinBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFAFA" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>
    <linearGradient id="badgeGradEmerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
  </defs>

  <!-- Background container -->
  <rect width="400" height="400" rx="20" fill="#F8FAF8" />
  
  <!-- Twin Tub Machine Body -->
  <rect x="70" y="110" width="260" height="230" rx="16" fill="url(#twinBody)" stroke="#94A3B8" stroke-width="2" />
  <path d="M 70,120 C 70,114 76,110 82,110 L 318,110 C 324,110 330,114 330,120 L 330,155 L 70,155 Z" fill="#0284C7" />
  <line x1="220" y1="155" x2="220" y2="340" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4 4" />
  
  <rect x="85" y="170" width="120" height="150" rx="6" fill="#F1F5F9" stroke="#94A3B8" />
  <rect x="235" y="170" width="80" height="150" rx="6" fill="#F1F5F9" stroke="#94A3B8" />

  <!-- Repair Overlay Badge (Emerald Theme) -->
  <g transform="translate(250, 40)">
    <circle cx="50" cy="50" r="46" fill="url(#badgeGradEmerald)" stroke="#FFFFFF" stroke-width="4" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.15))" />
    <!-- Checkmark inside badge representing successful service -->
    <path d="M 32,52 L 44,64 L 68,36" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Title -->
  <text x="200" y="65" fill="#1E293B" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">SEMI-AUTO RECONSTRUCTION</text>
  <text x="200" y="85" fill="#64748B" font-family="sans-serif" font-size="11" text-anchor="middle">Belt Replacement &amp; Dual Motor Tune-up</text>
</svg>
