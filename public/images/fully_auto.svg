<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="silverBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="glowCircle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="portalGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E7490" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#155E75" stop-opacity="0.8" />
    </linearGradient>
  </defs>

  <!-- Background container -->
  <rect width="400" height="400" rx="20" fill="#F4F6F4" />
  
  <!-- Outer Shadow -->
  <rect x="70" y="60" width="260" height="300" rx="24" fill="#000000" opacity="0.12" transform="translate(0, 15)" />

  <!-- Main Machine Body (Luxury Graphite Silver) -->
  <rect x="70" y="60" width="260" height="300" rx="24" fill="url(#silverBody)" stroke="#1E293B" stroke-width="3.5" />
  
  <!-- Glowing neon accent line at the bottom -->
  <path d="M 90,340 L 310,340" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" opacity="0.8" />

  <!-- Curved Top Control Panel (Bezel-less style) -->
  <rect x="80" y="70" width="240" height="45" rx="10" fill="#0F172A" stroke="#1E293B" stroke-width="1" />
  
  <!-- Touch control panel detail (Glowing indicators) -->
  <circle cx="105" cy="92" r="5" fill="#EF4444" /> <!-- Power Button -->
  <line x1="125" y1="92" x2="155" y2="92" stroke="#475569" stroke-width="3" stroke-linecap="round" />
  <circle cx="140" cy="92" r="2" fill="#06B6D4" />

  <!-- OLED touch display -->
  <rect x="175" y="78" width="85" height="28" rx="6" fill="#020617" stroke="#334155" stroke-width="1" />
  <text x="217" y="96" fill="#22D3EE" font-family="sans-serif" font-weight="bold" font-size="12" letter-spacing="1" text-anchor="middle">AI WASH</text>
  <circle cx="280" cy="92" r="4" fill="#10B981" />
  <circle cx="295" cy="92" r="4" fill="#3B82F6" />

  <!-- Futuristic Door Panel (Centered) -->
  <!-- Outer Ring with dark overlay -->
  <circle cx="200" cy="230" r="92" fill="none" stroke="#1E293B" stroke-width="2" opacity="0.5" />
  
  <!-- Glowing Neon Ring -->
  <circle cx="200" cy="230" r="82" fill="none" stroke="url(#glowCircle)" stroke-width="12" />
  <circle cx="200" cy="230" r="76" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" />
  
  <!-- Curved Portal Glass -->
  <circle cx="200" cy="230" r="70" fill="url(#portalGlass)" stroke="#0F172A" stroke-width="2" />
  
  <!-- High tech washer turbine blades visible inside -->
  <circle cx="200" cy="230" r="45" fill="none" stroke="#22D3EE" stroke-dasharray="10 20" stroke-width="4" opacity="0.4" />
  <circle cx="200" cy="230" r="30" fill="none" stroke="#FFFFFF" stroke-dasharray="4 6" stroke-width="2" opacity="0.3" />
  
  <!-- Center metallic hub -->
  <circle cx="200" cy="230" r="10" fill="#E2E8F0" />
  <circle cx="200" cy="230" r="5" fill="#94A3B8" />

  <!-- Minimal door trigger latch -->
  <rect x="272" y="222" width="6" height="16" rx="2" fill="#FFFFFF" opacity="0.9" />

  <!-- Brand Title -->
  <text x="200" y="50" fill="#334155" font-family="sans-serif" font-size="13" font-weight="bold" letter-spacing="1.5" text-anchor="middle">AERO-INTELLIGENCE</text>
</svg>
