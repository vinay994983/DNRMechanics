<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bodyGradFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EBEFEB" />
      <stop offset="100%" stop-color="#BFC7BF" />
    </linearGradient>
    <linearGradient id="badgeGradRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E11D48" />
      <stop offset="100%" stop-color="#BE123C" />
    </linearGradient>
    <linearGradient id="chromeRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2F4F2" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>
  </defs>

  <!-- Background container -->
  <rect width="400" height="400" rx="20" fill="#FFFBFB" />
  
  <!-- Vibration lines -->
  <path d="M 60,180 Q 40,220 60,260 M 45,160 Q 15,220 45,280" fill="none" stroke="#FDA4AF" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 8" />
  <path d="M 340,180 Q 360,220 340,260 M 355,160 Q 385,220 355,280" fill="none" stroke="#FDA4AF" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 8" />

  <!-- Machine Body with a tilt indicating severe vibration -->
  <g transform="rotate(3, 200, 220)">
    <rect x="100" y="110" width="200" height="240" rx="16" fill="url(#bodyGradFront)" stroke="#F43F5E" stroke-width="2.5" />
    <rect x="110" y="120" width="180" height="36" rx="6" fill="#111827" />
    <circle cx="200" cy="245" r="60" fill="none" stroke="url(#chromeRing)" stroke-width="8" />
    <circle cx="200" cy="245" r="50" fill="#1E3A8A" fill-opacity="0.3" stroke="#F43F5E" stroke-width="1.5" />
    <!-- Distorted water spiral inside -->
    <path d="M 175,235 Q 200,210 225,245" fill="none" stroke="#F43F5E" stroke-width="4" stroke-linecap="round" />
  </g>
  
  <!-- Alarm Badge overlay (Rose Theme) -->
  <g transform="translate(250, 40)">
    <circle cx="50" cy="50" r="46" fill="url(#badgeGradRose)" stroke="#FFFFFF" stroke-width="4" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.15))" />
    <!-- Noise/Soundwave Icon inside badge -->
    <path d="M 40,50 L 40,50 M 45,40 L 45,60 M 50,30 L 50,70 M 55,40 L 55,60 M 60,50 L 60,50" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />
    <path d="M 33,50 A 17,17 0 0,1 38,38 M 67,50 A 17,17 0 0,0 62,38" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Title -->
  <text x="200" y="65" fill="#1E293B" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">LOUD NOISE &amp; VIBRATION</text>
  <text x="200" y="85" fill="#64748B" font-family="sans-serif" font-size="11" text-anchor="middle">Dampener, Shock &amp; Drum Re-alignment</text>
</svg>
