<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2F4F2" />
      <stop offset="100%" stop-color="#D1D6D1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A554A" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#1C211C" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8F9A8F" />
      <stop offset="50%" stop-color="#E1E6E1" />
      <stop offset="100%" stop-color="#707A70" />
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>
  </defs>

  <!-- Background container -->
  <rect width="400" height="400" rx="20" fill="#F8FAF8" />
  
  <!-- Machine Body -->
  <rect x="80" y="110" width="240" height="240" rx="16" fill="url(#bodyGrad)" stroke="#A3AAA3" stroke-width="2" />
  <rect x="92" y="122" width="216" height="40" rx="6" fill="#141914" />
  <rect x="92" y="174" width="216" height="160" rx="10" fill="url(#glassGrad)" stroke="#5C665C" stroke-width="2" />
  <circle cx="200" cy="254" r="50" fill="none" stroke="#707A70" stroke-dasharray="6 4" stroke-width="2.5" opacity="0.4" />
  
  <!-- Repair Overlay Badge -->
  <g transform="translate(250, 40)">
    <circle cx="50" cy="50" r="46" fill="url(#badgeGrad)" stroke="#FFFFFF" stroke-width="4" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.15))" />
    <!-- Gear icon inside badge -->
    <path d="M 50,22 L 50,28 M 50,72 L 50,78 M 22,50 L 28,50 M 72,50 L 78,50 M 30,30 L 35,35 M 70,70 L 65,65 M 30,70 L 35,65 M 70,30 L 65,35" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />
    <circle cx="50" cy="50" r="18" fill="none" stroke="#FFFFFF" stroke-width="5" />
    <circle cx="50" cy="50" r="10" fill="url(#badgeGrad)" stroke="#FFFFFF" stroke-width="2" />
    <!-- Screwdriver & Wrench crossed -->
    <path d="M 33,67 L 67,33 M 33,33 L 67,67" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.9" />
  </g>

  <!-- Title -->
  <text x="200" y="65" fill="#1E293B" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">TOP LOAD DIAGNOSTIC</text>
  <text x="200" y="85" fill="#64748B" font-family="sans-serif" font-size="11" text-anchor="middle">Calibration &amp; Mechanical Fix</text>
</svg>
