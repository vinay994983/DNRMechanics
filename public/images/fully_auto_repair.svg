<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="silverBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="badgeGradIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#3730A3" />
    </linearGradient>
    <linearGradient id="glowCircle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
  </defs>

  <!-- Background container -->
  <rect width="400" height="400" rx="20" fill="#F8FAF8" />
  
  <!-- Main Machine Body (Luxury Graphite Silver) -->
  <rect x="90" y="100" width="220" height="260" rx="20" fill="url(#silverBody)" stroke="#1E293B" stroke-width="2" />
  <rect x="100" y="108" width="200" height="36" rx="6" fill="#0F172A" />
  <circle cx="200" cy="240" r="70" fill="none" stroke="url(#glowCircle)" stroke-width="8" />
  <circle cx="200" cy="240" r="58" fill="#155E75" fill-opacity="0.6" stroke="#0F172A" stroke-width="1.5" />

  <!-- Repair Overlay Badge (Indigo Shield/Security Theme) -->
  <g transform="translate(250, 40)">
    <circle cx="50" cy="50" r="46" fill="url(#badgeGradIndigo)" stroke="#FFFFFF" stroke-width="4" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.15))" />
    <!-- CPU/Circuit board icon representing PCB Diagnostics -->
    <rect x="34" y="34" width="32" height="32" rx="4" fill="none" stroke="#FFFFFF" stroke-width="3" />
    <circle cx="50" cy="50" r="6" fill="#FFFFFF" />
    <!-- Circuit lines -->
    <line x1="50" y1="26" x2="50" y2="34" stroke="#FFFFFF" stroke-width="2" />
    <line x1="50" y1="66" x2="50" y2="74" stroke="#FFFFFF" stroke-width="2" />
    <line x1="26" y1="50" x2="34" y2="50" stroke="#FFFFFF" stroke-width="2" />
    <line x1="66" y1="50" x2="74" y2="50" stroke="#FFFFFF" stroke-width="2" />
  </g>

  <!-- Title -->
  <text x="200" y="65" fill="#1E293B" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">SMART SYSTEM RESOLUTION</text>
  <text x="200" y="85" fill="#64748B" font-family="sans-serif" font-size="11" text-anchor="middle">PCB micro-soldering &amp; Sensor Calibration</text>
</svg>
