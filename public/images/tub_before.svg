<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2" />

  <!-- Outer Tub Rim (Heavy Plastic) -->
  <circle cx="200" cy="150" r="110" fill="none" stroke="#78716C" stroke-width="8" opacity="0.8" />
  <!-- Tub Basin Interior -->
  <circle cx="200" cy="150" r="102" fill="#57534E" />

  <!-- Black Muddy Sludge & Soap Scum Deposits -->
  <!-- Splattered mud paths -->
  <path d="M 120,100 C 130,120 110,180 140,210 C 160,230 190,210 210,230 C 230,250 220,260 250,250 C 270,240 290,190 280,160 Z" fill="#1C1917" opacity="0.95" />
  <path d="M 150,150 Q 180,190 220,160 T 270,220" stroke="#292524" stroke-width="15" stroke-linecap="round" fill="none" opacity="0.9" />
  <path d="M 130,220 Q 170,250 240,230" stroke="#1C1917" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.85" />
  
  <!-- Soap scum crusts (White/grey/green spots) -->
  <ellipse cx="140" cy="120" rx="12" ry="6" fill="#A8A29E" opacity="0.8" />
  <ellipse cx="260" cy="130" rx="15" ry="8" fill="#D6D3D1" opacity="0.75" />
  <circle cx="170" cy="220" r="14" fill="#A8A29E" opacity="0.7" />
  <circle cx="230" cy="200" r="10" fill="#78716C" opacity="0.8" />

  <!-- Corroded heating coil element (bottom center) -->
  <!-- Serpenting coil, dark rusted color -->
  <path d="M 150,220 L 150,240 C 150,250 170,250 170,240 L 170,215 C 170,205 190,205 190,215 L 190,240 C 190,250 210,250 210,240 L 210,215 C 210,205 230,205 230,215 L 230,240 C 230,250 250,250 250,240 L 250,220" fill="none" stroke="#292524" stroke-width="6" stroke-linecap="round" />
  <!-- Scaled white layer over heating element -->
  <path d="M 150,223 L 150,238 M 170,238 L 170,218 M 190,218 L 190,238 M 210,238 L 210,218 M 230,218 L 230,238 M 250,238 L 250,223" fill="none" stroke="#E7E5E4" stroke-width="3" stroke-linecap="round" opacity="0.85" />

  <!-- Label -->
  <rect x="20" y="20" width="130" height="26" rx="6" fill="#EF4444" />
  <text x="85" y="37" fill="#FFFFFF" font-family="sans-serif" font-weight="bold" font-size="11" text-anchor="middle">❌ SLUDGE &amp; SCUM</text>
</svg>
