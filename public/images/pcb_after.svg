<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cleanBoard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#166534" />
      <stop offset="50%" stop-color="#15803D" />
      <stop offset="100%" stop-color="#14532D" />
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="50%" stop-color="#475569" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2" />

  <!-- Circuit Board Body -->
  <rect x="60" y="60" width="280" height="180" rx="12" fill="url(#cleanBoard)" stroke="#15803D" stroke-width="3" />

  <!-- Shining Copper circuit lines (clean, shiny) -->
  <path d="M 90,90 L 140,90 L 160,110 L 220,110 M 90,140 L 130,140 L 150,160 L 220,160 M 250,90 L 310,90 L 310,140" fill="none" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round" opacity="0.9" />
  
  <!-- Other components on board -->
  <!-- IC Chip (micro-controller) -->
  <rect x="230" y="100" width="60" height="80" rx="3" fill="#1E293B" stroke="#0F172A" stroke-width="1.5" />
  <!-- IC pins -->
  <path d="M 222,110 L 230,110 M 222,125 L 230,125 M 222,140 L 230,140 M 222,155 L 230,155 M 222,170 L 230,170 M 290,110 L 298,110 M 290,125 L 298,125 M 290,140 L 298,140 M 290,155 L 298,155 M 290,170 L 298,170" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round" />

  <!-- Pristine New Solder Joints -->
  <circle cx="115" cy="110" r="4.5" fill="#94A3B8" stroke="#FFFFFF" stroke-width="1" />
  <circle cx="145" cy="110" r="4.5" fill="#94A3B8" stroke="#FFFFFF" stroke-width="1" />

  <!-- Brand New Radial Capacitor -->
  <g transform="translate(130, 110)">
    <!-- Main Cylinder (Vertical & perfect) -->
    <rect x="-13" y="-30" width="26" height="50" rx="3" fill="url(#capGrad)" stroke="#64748B" stroke-width="1" />
    <rect x="-13" y="-20" width="26" height="8" fill="#FFFFFF" opacity="0.15" />
    <!-- Solder Stripe -->
    <line x1="-13" y1="10" x2="13" y2="10" stroke="#94A3B8" stroke-width="2" />
    <!-- Top safety vent (perfect K-vent) -->
    <ellipse cx="0" cy="-30" rx="13" ry="5" fill="#334155" />
    <path d="M -8,-30 Q 0,-32 8,-30" fill="none" stroke="#475569" stroke-width="1.5" />
  </g>

  <!-- Sparkling clean reflections -->
  <path d="M 100,85 L 102,89 L 106,91 L 102,93 L 100,97 L 98,93 L 94,91 L 98,89 Z" fill="#FBBF24" />
  <path d="M 160,180 L 162,184 L 166,186 L 162,188 L 160,192 L 158,188 L 154,186 L 158,184 Z" fill="#FBBF24" />

  <!-- Label -->
  <rect x="20" y="20" width="120" height="26" rx="6" fill="#10B981" />
  <text x="80" y="37" fill="#FFFFFF" font-family="sans-serif" font-weight="bold" font-size="11" text-anchor="middle">✓ SOLDERED &amp; OK</text>
</svg>
