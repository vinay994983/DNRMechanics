<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2F4F2" />
      <stop offset="100%" stop-color="#D1D6D1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A554A" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#1C211C" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8F9A8F" />
      <stop offset="50%" stop-color="#E1E6E1" />
      <stop offset="100%" stop-color="#707A70" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D352D" />
      <stop offset="100%" stop-color="#141914" />
    </linearGradient>
  </defs>

  <!-- Background container -->
  <rect width="400" height="400" rx="20" fill="#F4F6F4" />
  
  <!-- Outer Shadow -->
  <rect x="60" y="80" width="280" height="280" rx="16" fill="#000000" opacity="0.08" transform="translate(0, 10)" />

  <!-- Main Machine Body -->
  <rect x="60" y="80" width="280" height="280" rx="16" fill="url(#bodyGrad)" stroke="#A3AAA3" stroke-width="3" />
  
  <!-- Metallic Front Accent Strip -->
  <path d="M 60,140 Q 200,145 340,140" fill="none" stroke="url(#metalGrad)" stroke-width="4" />

  <!-- Top Control Console Panel -->
  <rect x="75" y="95" width="250" height="50" rx="8" fill="url(#panelGrad)" stroke="#1F241F" stroke-width="2" />
  
  <!-- Glowing LED status lights -->
  <circle cx="95" cy="120" r="4" fill="#10B981" /> <!-- Green power -->
  <circle cx="110" cy="120" r="4" fill="#3B82F6" /> <!-- Blue wash -->
  <circle cx="125" cy="120" r="4" fill="#F59E0B" /> <!-- Amber spin -->
  
  <!-- Text Display -->
  <rect x="145" y="110" width="45" height="20" rx="4" fill="#0D110D" />
  <text x="167" y="125" fill="#34D399" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">28</text>
  
  <!-- Control Knob -->
  <circle cx="285" cy="120" r="14" fill="url(#metalGrad)" stroke="#1F241F" stroke-width="2" />
  <line x1="285" y1="120" x2="285" y2="108" stroke="#141914" stroke-width="3" stroke-linecap="round" />
  
  <!-- Top Glass Lid -->
  <rect x="75" y="160" width="250" height="180" rx="12" fill="url(#glassGrad)" stroke="#5C665C" stroke-width="3" />
  
  <!-- Inner Tub (Visible through glass lid) -->
  <circle cx="200" cy="250" r="65" fill="none" stroke="#707A70" stroke-dasharray="8 6" stroke-width="4" opacity="0.4" />
  <circle cx="200" cy="250" r="50" fill="none" stroke="#5C665C" stroke-width="2" opacity="0.3" />
  <circle cx="200" cy="250" r="30" fill="none" stroke="#A3AAA3" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5" />
  
  <!-- Agitator Center Cap -->
  <circle cx="200" cy="250" r="12" fill="url(#metalGrad)" stroke="#5C665C" stroke-width="1.5" opacity="0.8" />

  <!-- Glass Lid Handle -->
  <rect x="150" y="322" width="100" height="12" rx="6" fill="url(#metalGrad)" stroke="#4A554A" stroke-width="1.5" />
  
  <!-- Brand text -->
  <text x="200" y="70" fill="#4A554A" font-family="sans-serif" font-size="14" font-weight="bold" letter-spacing="1" text-anchor="middle">AQUA-SMART</text>
  <text x="200" y="380" fill="#707A70" font-family="sans-serif" font-size="11" text-anchor="middle">PREMIUM TOP LOAD SERIES</text>
</svg>
