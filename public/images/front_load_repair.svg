<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bodyGradFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EBEFEB" />
      <stop offset="100%" stop-color="#BFC7BF" />
    </linearGradient>
    <linearGradient id="chromeRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2F4F2" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>
    <linearGradient id="badgeGradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
  </defs>

  <!-- Background container -->
  <rect width="400" height="400" rx="20" fill="#F8FAF8" />
  
  <!-- Machine Body -->
  <rect x="90" y="100" width="220" height="260" rx="16" fill="url(#bodyGradFront)" stroke="#8F9A8F" stroke-width="2" />
  <rect x="100" y="110" width="200" height="40" rx="6" fill="#111827" />
  <circle cx="200" cy="245" r="65" fill="none" stroke="url(#chromeRing)" stroke-width="10" />
  <circle cx="200" cy="245" r="54" fill="#1E3A8A" fill-opacity="0.5" stroke="#1D4ED8" stroke-width="1.5" />
  
  <!-- Repair Overlay Badge (Blue Theme) -->
  <g transform="translate(250, 40)">
    <circle cx="50" cy="50" r="46" fill="url(#badgeGradBlue)" stroke="#FFFFFF" stroke-width="4" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.15))" />
    <!-- Hammer & Spanner crossed -->
    <path d="M 32,68 L 68,32" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" />
    <path d="M 68,68 L 32,32" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" />
    <circle cx="50" cy="50" r="8" fill="#FFFFFF" />
    <circle cx="50" cy="50" r="4" fill="url(#badgeGradBlue)" />
  </g>

  <!-- Title -->
  <text x="200" y="65" fill="#1E293B" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle">FRONT LOAD REBUILD</text>
  <text x="200" y="85" fill="#64748B" font-family="sans-serif" font-size="11" text-anchor="middle">Bearing, Seal &amp; Spider Restoration</text>
</svg>
