<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="rustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#451A03" />
      <stop offset="50%" stop-color="#78350F" />
      <stop offset="100%" stop-color="#9A3412" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2" />
  
  <!-- Outer circle shadow of washing machine drum -->
  <circle cx="200" cy="150" r="100" fill="none" stroke="#EF4444" stroke-width="4" stroke-dasharray="8 6" opacity="0.3" />

  <!-- Corroded and Broken 3-Arm Spider -->
  <!-- Arm 1 (pointing up) -->
  <path d="M 190,150 L 190,70 L 210,70 L 210,150 Z" fill="url(#rustGrad)" />
  <!-- Arm 2 (pointing bottom-right) -->
  <path d="M 200,150 L 270,190 L 260,208 L 190,160 Z" fill="url(#rustGrad)" />
  <!-- Arm 3 (pointing bottom-left, broken) -->
  <path d="M 200,150 L 130,190 L 140,208 L 210,160 Z" fill="url(#rustGrad)" />

  <!-- Severe Lime-scale Deposits (spotted muddy textures over the spider) -->
  <circle cx="200" cy="150" r="28" fill="#78716C" stroke="#44403C" stroke-width="2" />
  <circle cx="196" cy="100" r="12" fill="#D6D3D1" stroke="#A8A29E" stroke-width="1.5" />
  <circle cx="250" cy="180" r="10" fill="#D6D3D1" stroke="#A8A29E" stroke-width="1.5" />
  <!-- Rust Stains -->
  <path d="M 185,120 Q 200,122 215,120 L 210,140 Q 200,145 190,140 Z" fill="#B45309" opacity="0.8" />
  <path d="M 220,160 L 245,175 L 240,185 L 215,170 Z" fill="#B45309" opacity="0.8" />
  
  <!-- Cracks / Break lines -->
  <!-- Crack in the center hub -->
  <path d="M 188,140 L 202,152 L 198,162" fill="none" stroke="#000000" stroke-width="3.5" stroke-linecap="round" />
  <!-- Crack in bottom left arm -->
  <path d="M 160,172 L 175,180 L 168,188" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="round" />
  <!-- Broken chunk of arm 3 floating off -->
  <path d="M 120,195 L 110,210 L 125,215 Z" fill="url(#rustGrad)" stroke="#1C1917" stroke-width="1.5" />
  
  <!-- Warning Text Overlay -->
  <rect x="20" y="20" width="130" height="26" rx="6" fill="#EF4444" />
  <text x="85" y="37" fill="#FFFFFF" font-family="sans-serif" font-weight="bold" font-size="11" text-anchor="middle">❌ CRACKED &amp; DECAYED</text>
</svg>
