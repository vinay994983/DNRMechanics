<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="30%" stop-color="#E2E8F0" />
      <stop offset="70%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="shaftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="50%" stop-color="#F1F5F9" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2" />

  <!-- Stainless Steel Drum boundary -->
  <circle cx="200" cy="150" r="105" fill="none" stroke="#64748B" stroke-width="2" opacity="0.4" />
  <circle cx="200" cy="150" r="100" fill="none" stroke="#10B981" stroke-width="3" stroke-dasharray="6 4" opacity="0.6" />

  <!-- Restored/New 3-Arm Spider -->
  <!-- Arm 1 (pointing up) -->
  <path d="M 192,150 L 192,60 C 192,56 208,56 208,60 L 208,150 Z" fill="url(#chromeGrad)" stroke="#334155" stroke-width="1.5" />
  <!-- Arm 2 (pointing bottom-right) -->
  <path d="M 200,150 L 278,195 C 282,198 274,212 270,209 L 192,160 Z" fill="url(#chromeGrad)" stroke="#334155" stroke-width="1.5" />
  <!-- Arm 3 (pointing bottom-left) -->
  <path d="M 200,150 L 122,195 C 118,198 126,212 130,209 L 208,160 Z" fill="url(#chromeGrad)" stroke="#334155" stroke-width="1.5" />

  <!-- Brand New Heavy Duty Hub with Bolts -->
  <circle cx="200" cy="150" r="32" fill="url(#chromeGrad)" stroke="#1E293B" stroke-width="2" />
  
  <!-- High Speed Calibration Shaft (glowing center) -->
  <circle cx="200" cy="150" r="14" fill="url(#shaftGrad)" stroke="#0F172A" stroke-width="2" />
  <circle cx="200" cy="150" r="6" fill="#1E293B" />

  <!-- Solid Lock Bolts on the arms -->
  <rect x="194" y="65" width="12" height="8" rx="2" fill="url(#shaftGrad)" stroke="#000" stroke-width="1" />
  <rect x="255" y="193" width="12" height="8" rx="2" fill="url(#shaftGrad)" stroke="#000" stroke-width="1" transform="rotate(30, 261, 197)" />
  <rect x="133" y="193" width="12" height="8" rx="2" fill="url(#shaftGrad)" stroke="#000" stroke-width="1" transform="rotate(-30, 139, 197)" />

  <!-- Success Status Indicator -->
  <rect x="20" y="20" width="120" height="26" rx="6" fill="#10B981" />
  <text x="80" y="37" fill="#FFFFFF" font-family="sans-serif" font-weight="bold" font-size="11" text-anchor="middle">✓ OEM RESTORED</text>
</svg>
