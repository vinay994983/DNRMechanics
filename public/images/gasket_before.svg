<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2" />

  <!-- Gray Door Bellows Rubber Seal (Deformed/Warped) -->
  <circle cx="200" cy="150" r="95" fill="none" stroke="#78716C" stroke-width="24" opacity="0.9" />
  <circle cx="200" cy="150" r="95" fill="none" stroke="#44403C" stroke-width="2" stroke-dasharray="4 8" opacity="0.4" />
  
  <!-- Outer metallic door frame behind bellows -->
  <circle cx="200" cy="150" r="109" fill="none" stroke="#D1D5DB" stroke-width="4" opacity="0.8" />

  <!-- Black Mold and soap scum deposits caked in the bellows folds -->
  <!-- We place scattered dark blotches over the bottom half of the gasket ring -->
  <circle cx="170" cy="225" r="8" fill="#1C1917" opacity="0.9" />
  <circle cx="174" cy="223" r="5" fill="#292524" />
  <circle cx="230" cy="220" r="10" fill="#1C1917" opacity="0.85" />
  <ellipse cx="200" cy="238" rx="20" ry="6" fill="#1C1917" opacity="0.9" />
  <circle cx="130" cy="190" r="7" fill="#292524" opacity="0.8" />
  <circle cx="270" cy="180" r="9" fill="#292524" opacity="0.8" />
  <ellipse cx="150" cy="210" rx="12" ry="5" fill="#44403C" opacity="0.7" />

  <!-- Tear/Cut in the rubber gasket (Active Leak Source) -->
  <path d="M 245,170 Q 255,160 260,172 L 250,185 Q 242,178 245,170 Z" fill="#991B1B" stroke="#000" stroke-width="1.5" />
  <!-- Water drops escaping from the tear -->
  <path d="M 252,192 C 252,195 250,198 248,198 C 246,198 244,195 252,192 Z" fill="#3B82F6" stroke="#1D4ED8" stroke-width="1" />
  <path d="M 258,205 C 258,208 256,211 254,211 C 252,211 250,208 258,205 Z" fill="#3B82F6" stroke="#1D4ED8" stroke-width="1" transform="translate(4,4) scale(1.3)" />

  <!-- Label -->
  <rect x="20" y="20" width="130" height="26" rx="6" fill="#EF4444" />
  <text x="85" y="37" fill="#FFFFFF" font-family="sans-serif" font-weight="bold" font-size="11" text-anchor="middle">❌ TORN &amp; MOLDY</text>
</svg>
