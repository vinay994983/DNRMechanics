<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="elementGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2" />

  <!-- Outer Tub Rim (Heavy Clean Plastic) -->
  <circle cx="200" cy="150" r="110" fill="none" stroke="#CBD5E1" stroke-width="8" opacity="0.9" />
  <!-- Tub Basin Interior (Clean White/Blue Plastic) -->
  <circle cx="200" cy="150" r="102" fill="#E0F2FE" />
  <circle cx="200" cy="150" r="92" fill="#F0F9FF" />

  <!-- Water shine effects -->
  <ellipse cx="150" cy="110" rx="30" ry="10" fill="#FFFFFF" opacity="0.6" transform="rotate(-15, 150, 110)" />
  <ellipse cx="250" cy="100" rx="15" ry="5" fill="#FFFFFF" opacity="0.5" transform="rotate(-15, 250, 100)" />
  
  <!-- Sparkling stars (service complete) -->
  <path d="M 140,80 L 143,87 L 150,90 L 143,93 L 140,100 L 137,93 L 130,90 L 137,87 Z" fill="#38BDF8" />
  <path d="M 270,140 L 272,144 L 276,146 L 272,148 L 270,152 L 268,148 L 264,146 L 268,144 Z" fill="#38BDF8" />

  <!-- Clean sparkling heating coil element (bottom center) -->
  <!-- Serpenting coil, clean silver metallic chrome -->
  <path d="M 150,220 L 150,240 C 150,252 170,252 170,240 L 170,215 C 170,203 190,203 190,215 L 190,240 C 190,252 210,252 210,240 L 210,215 C 210,203 230,203 230,215 L 230,240 C 230,252 250,252 250,240 L 250,220" fill="none" stroke="url(#elementGrad)" stroke-width="8" stroke-linecap="round" />
  <!-- Gloss reflection highlight line -->
  <path d="M 150,221 L 150,239 M 170,239 L 170,216 M 190,216 L 190,239 M 210,239 L 210,216 M 230,216 L 230,239 M 250,239 L 250,221" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.9" />

  <!-- Label -->
  <rect x="20" y="20" width="120" height="26" rx="6" fill="#10B981" />
  <text x="80" y="37" fill="#FFFFFF" font-family="sans-serif" font-weight="bold" font-size="11" text-anchor="middle">✓ DESCALED &amp; CLEAN</text>
</svg>
