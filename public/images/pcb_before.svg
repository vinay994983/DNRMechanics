<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="burnedBoard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14532D" />
      <stop offset="60%" stop-color="#0F2F1D" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2" />

  <!-- Circuit Board Body -->
  <rect x="60" y="60" width="280" height="180" rx="12" fill="url(#burnedBoard)" stroke="#166534" stroke-width="3" />

  <!-- Copper circuit lines (darkened/oxidized) -->
  <path d="M 90,90 L 140,90 L 160,110 L 220,110 M 90,140 L 130,140 L 150,160 L 220,160 M 250,90 L 310,90 L 310,140" fill="none" stroke="#854D0E" stroke-width="3" stroke-linecap="round" opacity="0.6" />
  
  <!-- Other components on board -->
  <!-- IC Chip (micro-controller) -->
  <rect x="230" y="100" width="60" height="80" rx="3" fill="#1E293B" stroke="#0F172A" stroke-width="1.5" />
  <!-- IC pins -->
  <path d="M 222,110 L 230,110 M 222,125 L 230,125 M 222,140 L 230,140 M 222,155 L 230,155 M 222,170 L 230,170 M 290,110 L 298,110 M 290,125 L 298,125 M 290,140 L 298,140 M 290,155 L 298,155 M 290,170 L 298,170" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" />

  <!-- Blown Capacitor (The fault center) -->
  <!-- Cylinder component, tilted, exploded/swollen top -->
  <g transform="translate(130, 110) rotate(-15)">
    <!-- Main Cylinder -->
    <rect x="-15" y="-30" width="30" height="60" rx="4" fill="#020617" stroke="#1E293B" stroke-width="1.5" />
    <!-- Explosion burst top with cracks -->
    <ellipse cx="0" cy="-30" rx="15" ry="6" fill="#7F1D1D" stroke="#EF4444" stroke-width="2" />
    <path d="M -10,-30 L 10,-30 M 0,-36 L 0,-24" stroke="#000" stroke-width="2.5" />
    <path d="M -5,-30 L 5,-30" stroke="#EF4444" stroke-width="3" />
  </g>

  <!-- Charred black smoke mark overlay -->
  <ellipse cx="125" cy="115" rx="50" ry="35" fill="#000000" opacity="0.85" filter="drop-shadow(0 0 10px rgba(0,0,0,0.9))" />
  
  <!-- Red glowing spark effect -->
  <circle cx="125" cy="95" r="4" fill="#EF4444" />
  <path d="M 125,80 L 125,90 M 125,100 L 125,110 M 110,95 L 120,95 M 130,95 L 140,95" stroke="#F59E0B" stroke-width="2" />

  <!-- Label -->
  <rect x="20" y="20" width="130" height="26" rx="6" fill="#EF4444" />
  <text x="85" y="37" fill="#FFFFFF" font-family="sans-serif" font-weight="bold" font-size="11" text-anchor="middle">❌ SHORTED PCB</text>
</svg>
